<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paris Map — Prototype Offline</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F3EE;
    --surface: #FAFAF8;
    --border: #E2DDD6;
    --text: #1C1917;
    --text-muted: #78716C;
    --accent: #1C4ED8;
    --panel-w: 400px;
    --header-h: 52px;
    --filter-h: 44px;
    --shadow: 0 4px 24px rgba(0,0,0,.10);
    --radius: 12px;

    --cat-culture:      #E63946;
    --cat-food:         #F4A261;
    --cat-nature:       #2A9D8F;
    --cat-architecture: #457B9D;
    --cat-secret:       #9B5DE5;
    --cat-other:        #6B7280;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    z-index: 1000;
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .logo span { color: var(--accent); }
  .header-spacer { flex: 1; }
  .poi-count {
    font-size: .75rem;
    color: var(--text-muted);
    background: var(--border);
    padding: 3px 10px;
    border-radius: 99px;
  }
  .btn-export {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 12px;
    font: 500 .78rem 'DM Sans', sans-serif;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .15s;
  }
  .btn-export:hover { border-color: var(--text-muted); color: var(--text); }

  /* ── FILTER BAR ── */
  .filter-bar {
    height: var(--filter-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 6px;
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    border-radius: 99px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font: 500 .74rem 'DM Sans', sans-serif;
    color: var(--text-muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
    user-select: none;
  }
  .filter-chip .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
  }
  .filter-chip.active {
    background: var(--text);
    border-color: var(--text);
    color: #fff;
  }
  .filter-chip.active .dot { opacity: .8; }

  /* ── MAIN LAYOUT ── */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  #map {
    flex: 1;
    z-index: 1;
  }

  /* Hint overlay */
  .map-hint {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(28,25,23,.85);
    color: #fff;
    font-size: .75rem;
    padding: 7px 16px;
    border-radius: 99px;
    pointer-events: none;
    z-index: 500;
    backdrop-filter: blur(4px);
    opacity: 1;
    transition: opacity .5s;
  }
  .map-hint.hidden { opacity: 0; }

  /* ── SIDE PANEL ── */
  .panel {
    width: var(--panel-w);
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    z-index: 200;
    overflow: hidden;
    flex-shrink: 0;
  }
  .panel.open { transform: translateX(0); }

  .panel-header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .panel-title {
    flex: 1;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 600;
  }
  .btn-close {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border: none; background: none; cursor: pointer;
    border-radius: 6px; color: var(--text-muted);
    font-size: 1.1rem;
    transition: background .15s;
  }
  .btn-close:hover { background: var(--border); color: var(--text); }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ── FORM ELEMENTS ── */
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-label {
    font-size: .74rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .form-input, .form-textarea, .form-select {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 9px 11px;
    font: 400 .88rem 'DM Sans', sans-serif;
    color: var(--text);
    transition: border-color .15s;
    outline: none;
    width: 100%;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus {
    border-color: var(--accent);
  }
  .form-textarea { resize: vertical; min-height: 80px; }

  /* Category selector */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .cat-btn {
    padding: 7px 4px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    font: 500 .74rem 'DM Sans', sans-serif;
    color: var(--text-muted);
    cursor: pointer;
    text-align: center;
    transition: all .15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .cat-btn .cat-icon { font-size: 1.1rem; }
  .cat-btn.selected {
    border-width: 2px;
    color: var(--text);
    font-weight: 600;
  }

  /* Tags */
  .tag-input-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 6px 8px;
    min-height: 40px;
    align-items: center;
    cursor: text;
    transition: border-color .15s;
  }
  .tag-input-wrap:focus-within { border-color: var(--accent); }
  .tag-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--text);
    color: #fff;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: .74rem;
  }
  .tag-chip button {
    background: none; border: none; color: rgba(255,255,255,.6);
    cursor: pointer; font-size: .8rem; padding: 0; line-height: 1;
  }
  .tag-chip button:hover { color: #fff; }
  #tag-input {
    border: none; background: none; outline: none;
    font: 400 .84rem 'DM Sans', sans-serif;
    color: var(--text);
    flex: 1; min-width: 80px;
  }

  /* Photo upload */
  .photo-drop {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all .15s;
    color: var(--text-muted);
    font-size: .84rem;
  }
  .photo-drop:hover { border-color: var(--accent); color: var(--accent); background: rgba(28,78,216,.03); }
  .photo-drop .icon { font-size: 1.6rem; display: block; margin-bottom: 4px; }
  #file-input { display: none; }

  .photo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .photo-thumb {
    aspect-ratio: 1;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    background: var(--border);
  }
  .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .photo-thumb .del-photo {
    position: absolute; top: 3px; right: 3px;
    background: rgba(0,0,0,.6); color: #fff;
    border: none; border-radius: 99px;
    width: 20px; height: 20px;
    font-size: .7rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* Buttons */
  .panel-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .btn-primary {
    flex: 1;
    padding: 10px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: 9px;
    font: 600 .88rem 'DM Sans', sans-serif;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn-primary:hover { opacity: .85; }
  .btn-secondary {
    padding: 10px 16px;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 9px;
    font: 500 .88rem 'DM Sans', sans-serif;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .15s;
  }
  .btn-secondary:hover { border-color: var(--text-muted); color: var(--text); }
  .btn-danger {
    padding: 10px 14px;
    background: none;
    border: 1.5px solid #FCA5A5;
    border-radius: 9px;
    font: 500 .88rem 'DM Sans', sans-serif;
    color: #DC2626;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-danger:hover { background: #FEF2F2; }

  /* ── DETAIL VIEW ── */
  .detail-category-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 11px;
    border-radius: 99px;
    font: 500 .74rem 'DM Sans', sans-serif;
    color: #fff;
    margin-bottom: 6px;
  }
  .detail-description {
    font-size: .88rem;
    line-height: 1.6;
    color: var(--text-muted);
  }
  .detail-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .detail-tag {
    padding: 3px 9px;
    border-radius: 99px;
    background: var(--border);
    font-size: .74rem;
    color: var(--text-muted);
  }
  .detail-photo-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
  }
  .detail-photo {
    aspect-ratio: 4/3;
    border-radius: 8px;
    overflow: hidden;
    background: var(--border);
  }
  .detail-photo img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
  .detail-coords {
    font-size: .74rem;
    color: var(--text-muted);
    font-feature-settings: "tnum";
  }

  /* ── LIGHTBOX ── */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.92);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
  }
  .lightbox.open { opacity: 1; pointer-events: all; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
  .lightbox-close {
    position: absolute; top: 20px; right: 20px;
    color: #fff; font-size: 1.5rem;
    background: none; border: none; cursor: pointer;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: #fff;
    padding: 10px 18px;
    border-radius: 99px;
    font-size: .82rem;
    z-index: 9998;
    opacity: 0;
    transition: all .3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── LEAFLET OVERRIDES ── */
  .leaflet-popup-content-wrapper {
    border-radius: var(--radius) !important;
    box-shadow: var(--shadow) !important;
    font-family: 'DM Sans', sans-serif !important;
    border: 1px solid var(--border) !important;
    padding: 0 !important;
    overflow: hidden;
  }
  .leaflet-popup-content {
    margin: 0 !important;
    padding: 14px 16px !important;
    min-width: 200px;
  }
  .leaflet-popup-tip-container { display: none; }
  .popup-title {
    font: 600 .92rem 'DM Sans', sans-serif;
    color: var(--text);
    margin-bottom: 4px;
  }
  .popup-cat {
    font-size: .74rem;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .popup-actions { display: flex; gap: 6px; }
  .popup-btn {
    flex: 1;
    padding: 6px 0;
    border-radius: 7px;
    border: 1.5px solid var(--border);
    background: none;
    font: 500 .78rem 'DM Sans', sans-serif;
    color: var(--text);
    cursor: pointer;
    transition: all .15s;
    text-align: center;
  }
  .popup-btn:hover { background: var(--bg); }
  .popup-btn.primary {
    background: var(--text);
    border-color: var(--text);
    color: #fff;
  }
  .popup-btn.primary:hover { opacity: .85; }

  /* Custom markers */
  .custom-marker {
    width: 32px; height: 40px;
    display: flex; align-items: flex-start; justify-content: center;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,.3));
    cursor: pointer;
  }
  .custom-marker svg { width: 32px; height: 40px; }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    .panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      width: 100%;
      max-height: 85dvh;
      border-left: none;
      border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      transform: translateY(100%);
    }
    .panel.open { transform: translateY(0); }
    .map-hint { bottom: 16px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Paris<span>Map</span> <span style="font-family:sans-serif;font-size:.9rem">🗺️</span></div>
  <div class="header-spacer"></div>
  <span class="poi-count" id="poi-count">0 lieux</span>
  <button class="btn-export" onclick="exportData()">Exporter</button>
</header>

<!-- FILTER BAR -->
<div class="filter-bar" id="filter-bar"></div>

<!-- MAIN -->
<div class="main">
  <div id="map"></div>
  <div class="map-hint" id="map-hint">Double-clic sur la carte pour ajouter un lieu</div>

  <!-- SIDE PANEL -->
  <div class="panel" id="panel">
    <div class="panel-header">
      <div class="panel-title" id="panel-title">Nouveau lieu</div>
      <button class="btn-close" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
    <div class="panel-footer" id="panel-footer"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ═══════════════════════════════════════════════
// CONFIGURATION
// ═══════════════════════════════════════════════
const CATEGORIES = {
  culture:      { label: "Culture",       icon: "📚", color: "#E63946" },
  food:         { label: "Restauration",  icon: "🍽️", color: "#F4A261" },
  nature:       { label: "Nature",        icon: "🌿", color: "#2A9D8F" },
  architecture: { label: "Architecture",  icon: "🏛️", color: "#457B9D" },
  secret:       { label: "Secret",        icon: "⭐", color: "#9B5DE5" },
  other:        { label: "Autre",         icon: "📍", color: "#6B7280" },
};

// ═══════════════════════════════════════════════
// INDEXEDDB
// ═══════════════════════════════════════════════
const DB_NAME = 'paris-map-v1';
const DB_VERSION = 1;
let db;

async function initDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('poi')) {
        const s = db.createObjectStore('poi', { keyPath: 'id' });
        s.createIndex('category', 'content.category');
      }
      if (!db.objectStoreNames.contains('photos')) {
        const s = db.createObjectStore('photos', { keyPath: 'photoId' });
        s.createIndex('poiId', 'poiId');
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = e => reject(e);
  });
}

async function dbGetAll(store) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror = rej;
  });
}
async function dbGet(store, key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = rej;
  });
}
async function dbPut(store, val) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(val);
    req.onsuccess = () => res(req.result);
    req.onerror = rej;
  });
}
async function dbDelete(store, key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = () => res();
    req.onerror = rej;
  });
}
async function dbGetByIndex(store, index, value) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).index(index).getAll(value);
    req.onsuccess = () => res(req.result);
    req.onerror = rej;
  });
}

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let map;
const layers = {};
const markers = {};
let panelMode = null; // 'add' | 'edit' | 'detail'
let editPoiId = null;
let pendingLatLng = null;
let formPhotos = []; // { blob, url, id? (existing) }
let formTags = [];
let activeCategories = new Set(Object.keys(CATEGORIES));
let allPois = [];

// ═══════════════════════════════════════════════
// MAP INIT
// ═══════════════════════════════════════════════
function initMap() {
  map = L.map('map', {
    center: [48.8566, 2.3522],
    zoom: 13,
    preferCanvas: true,
    zoomControl: true,
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
    minZoom: 10,
    crossOrigin: true,
  }).addTo(map);

  for (const key of Object.keys(CATEGORIES)) {
    layers[key] = L.layerGroup().addTo(map);
  }

  map.on('dblclick', e => {
    e.originalEvent.preventDefault();
    pendingLatLng = { lat: e.latlng.lat, lng: e.latlng.lng };
    openAddForm();
  });

  // Hide hint after first interaction
  map.on('movestart', hideHint);
}

let hintHidden = false;
function hideHint() {
  if (hintHidden) return;
  hintHidden = true;
  document.getElementById('map-hint').classList.add('hidden');
}

// ═══════════════════════════════════════════════
// MARKERS
// ═══════════════════════════════════════════════
function makeMarkerIcon(category) {
  const cat = CATEGORIES[category] || CATEGORIES.other;
  const svg = `<svg viewBox="0 0 32 40" xmlns="http://www.w3.org/2000/svg">
    <path d="M16 0C9.37 0 4 5.37 4 12c0 9 12 28 12 28s12-19 12-28C28 5.37 22.63 0 16 0z"
      fill="${cat.color}" stroke="rgba(0,0,0,.2)" stroke-width="1"/>
    <circle cx="16" cy="12" r="6" fill="white" fill-opacity=".9"/>
    <text x="16" y="16" text-anchor="middle" font-size="8" font-family="sans-serif">${cat.icon}</text>
  </svg>`;
  return L.divIcon({
    html: `<div class="custom-marker">${svg}</div>`,
    iconSize: [32, 40],
    iconAnchor: [16, 40],
    popupAnchor: [0, -42],
    className: '',
  });
}

function addMarkerToMap(poi) {
  const cat = poi.content.category || 'other';
  const marker = L.marker([poi.location.lat, poi.location.lng], {
    icon: makeMarkerIcon(cat),
  });

  marker.bindPopup(() => {
    const div = document.createElement('div');
    const catInfo = CATEGORIES[cat] || CATEGORIES.other;
    div.innerHTML = `
      <div class="popup-title">${escHtml(poi.content.title || 'Sans titre')}</div>
      <div class="popup-cat">${catInfo.icon} ${catInfo.label}</div>
      <div class="popup-actions">
        <button class="popup-btn" onclick="openEditForm('${poi.id}');map.closePopup()">Modifier</button>
        <button class="popup-btn primary" onclick="openDetail('${poi.id}');map.closePopup()">Détails</button>
      </div>
    `;
    return div;
  }, { maxWidth: 240 });

  marker.addTo(layers[cat]);
  markers[poi.id] = marker;
}

function removeMarkerFromMap(poiId) {
  if (markers[poiId]) {
    map.removeLayer(markers[poiId]);
    delete markers[poiId];
  }
}

// ═══════════════════════════════════════════════
// FILTER BAR
// ═══════════════════════════════════════════════
function renderFilterBar() {
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = '';

  for (const [key, cat] of Object.entries(CATEGORIES)) {
    const chip = document.createElement('button');
    chip.className = 'filter-chip' + (activeCategories.has(key) ? ' active' : '');
    chip.innerHTML = `<span class="dot" style="background:${cat.color}"></span>${cat.icon} ${cat.label}`;
    chip.onclick = () => toggleCategory(key);
    bar.appendChild(chip);
  }
}

function toggleCategory(key) {
  if (activeCategories.has(key)) {
    activeCategories.delete(key);
    map.removeLayer(layers[key]);
  } else {
    activeCategories.add(key);
    layers[key].addTo(map);
  }
  renderFilterBar();
}

// ═══════════════════════════════════════════════
// PANEL
// ═══════════════════════════════════════════════
function openPanel(title) {
  document.getElementById('panel-title').textContent = title;
  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  panelMode = null;
  editPoiId = null;
  pendingLatLng = null;
  formPhotos = [];
  formTags = [];
}

// ═══════════════════════════════════════════════
// ADD / EDIT FORM
// ═══════════════════════════════════════════════
function openAddForm() {
  panelMode = 'add';
  editPoiId = null;
  formPhotos = [];
  formTags = [];
  renderForm(null);
  openPanel('Nouveau lieu');
}

async function openEditForm(poiId) {
  panelMode = 'edit';
  editPoiId = poiId;
  const poi = await dbGet('poi', poiId);
  const photos = await dbGetByIndex('photos', 'poiId', poiId);
  formPhotos = photos.map(p => ({ blob: p.blob, url: URL.createObjectURL(p.blob), existingId: p.photoId }));
  formTags = [...(poi.content.tags || [])];
  renderForm(poi);
  openPanel('Modifier le lieu');
}

function renderForm(poi) {
  const body = document.getElementById('panel-body');
  const footer = document.getElementById('panel-footer');

  // Category grid
  const catGridHtml = Object.entries(CATEGORIES).map(([key, cat]) =>
    `<button type="button" class="cat-btn${poi?.content?.category === key ? ' selected' : ''}"
      data-cat="${key}"
      style="${poi?.content?.category === key ? `border-color:${cat.color};background:${cat.color}20;` : ''}"
      onclick="selectCat(this,'${key}','${cat.color}')">
      <span class="cat-icon">${cat.icon}</span>
      <span>${cat.label}</span>
    </button>`
  ).join('');

  body.innerHTML = `
    <div class="form-group">
      <label class="form-label">Titre *</label>
      <input class="form-input" id="f-title" placeholder="Nom du lieu" value="${escHtml(poi?.content?.title || '')}">
    </div>
    <div class="form-group">
      <label class="form-label">Catégorie *</label>
      <div class="cat-grid" id="cat-grid">${catGridHtml}</div>
      <input type="hidden" id="f-category" value="${poi?.content?.category || ''}">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="f-desc" placeholder="Notes, souvenirs, infos pratiques…">${escHtml(poi?.content?.description || '')}</textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Tags <span style="font-weight:400;color:var(--text-muted)">— Entrée pour valider</span></label>
      <div class="tag-input-wrap" onclick="document.getElementById('tag-input').focus()">
        <div id="tags-display"></div>
        <input id="tag-input" placeholder="Ajouter un tag…" onkeydown="handleTagKey(event)">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Photos</label>
      <div class="photo-drop" onclick="document.getElementById('file-input').click()">
        <span class="icon">📷</span>Cliquer pour importer des photos<br>
        <small style="color:var(--text-muted)">JPG, PNG, WebP</small>
      </div>
      <input type="file" id="file-input" accept="image/*" multiple onchange="handleFileInput(event)">
      <div class="photo-grid" id="photo-preview"></div>
    </div>
    ${poi ? `<div class="detail-coords">📍 ${poi.location.lat.toFixed(5)}, ${poi.location.lng.toFixed(5)}</div>` : ''}
  `;

  renderTagsDisplay();
  renderPhotoPreview();

  footer.innerHTML = `
    <button class="btn-secondary" onclick="closePanel()">Annuler</button>
    <button class="btn-primary" onclick="savePoi()">Enregistrer</button>
  `;
}

function selectCat(el, key, color) {
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.remove('selected');
    b.style.borderColor = '';
    b.style.background = '';
  });
  el.classList.add('selected');
  el.style.borderColor = color;
  el.style.background = color + '20';
  document.getElementById('f-category').value = key;
}

function handleTagKey(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim().toLowerCase().replace(/[^a-z0-9À-ÿ\s\-]/g, '');
    if (val && !formTags.includes(val)) {
      formTags.push(val);
      renderTagsDisplay();
    }
    e.target.value = '';
  }
}

function removeTag(tag) {
  formTags = formTags.filter(t => t !== tag);
  renderTagsDisplay();
}

function renderTagsDisplay() {
  const el = document.getElementById('tags-display');
  if (!el) return;
  el.innerHTML = formTags.map(t =>
    `<span class="tag-chip">${escHtml(t)}<button onclick="removeTag('${escHtml(t)}')" type="button">✕</button></span>`
  ).join('');
}

async function handleFileInput(e) {
  const files = Array.from(e.target.files);
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    const url = URL.createObjectURL(file);
    formPhotos.push({ blob: file, url });
  }
  renderPhotoPreview();
  e.target.value = '';
}

function renderPhotoPreview() {
  const grid = document.getElementById('photo-preview');
  if (!grid) return;
  grid.innerHTML = formPhotos.map((p, i) => `
    <div class="photo-thumb">
      <img src="${p.url}" alt="">
      <button class="del-photo" onclick="removeFormPhoto(${i})" type="button">✕</button>
    </div>
  `).join('');
}

function removeFormPhoto(i) {
  URL.revokeObjectURL(formPhotos[i].url);
  formPhotos.splice(i, 1);
  renderPhotoPreview();
}

// ═══════════════════════════════════════════════
// SAVE POI
// ═══════════════════════════════════════════════
async function savePoi() {
  const title = document.getElementById('f-title').value.trim();
  const category = document.getElementById('f-category').value;
  const description = document.getElementById('f-desc').value.trim();

  if (!title) { showToast('⚠️ Titre requis'); return; }
  if (!category) { showToast('⚠️ Catégorie requise'); return; }

  const now = new Date().toISOString();
  const id = editPoiId || `poi_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;

  // Save new photos
  const photoRefs = [];

  // Keep existing photos
  for (const p of formPhotos) {
    if (p.existingId) {
      photoRefs.push({ photoId: p.existingId });
    }
  }

  // Save new photos
  for (const p of formPhotos) {
    if (!p.existingId) {
      const photoId = `photo_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
      await dbPut('photos', {
        photoId,
        poiId: id,
        blob: p.blob,
        mimeType: p.blob.type,
        sizeBytes: p.blob.size,
        createdAt: now
      });
      photoRefs.push({ photoId });
    }
  }

  // Delete removed existing photos
  if (editPoiId) {
    const existingPhotos = await dbGetByIndex('photos', 'poiId', editPoiId);
    const keptIds = new Set(formPhotos.filter(p => p.existingId).map(p => p.existingId));
    for (const ep of existingPhotos) {
      if (!keptIds.has(ep.photoId)) await dbDelete('photos', ep.photoId);
    }
  }

  const poi = {
    id,
    version: 1,
    createdAt: editPoiId ? (await dbGet('poi', editPoiId))?.createdAt || now : now,
    updatedAt: now,
    location: pendingLatLng || (editPoiId ? (await dbGet('poi', editPoiId))?.location : null),
    content: { title, description, tags: formTags, category },
    photos: photoRefs,
  };

  await dbPut('poi', poi);

  // Update map
  if (editPoiId) removeMarkerFromMap(editPoiId);
  addMarkerToMap(poi);

  // Update local list
  allPois = await dbGetAll('poi');
  updatePoiCount();

  closePanel();
  showToast(editPoiId ? '✅ Lieu mis à jour' : '✅ Lieu ajouté !');
}

// ═══════════════════════════════════════════════
// DETAIL VIEW
// ═══════════════════════════════════════════════
async function openDetail(poiId) {
  panelMode = 'detail';
  const poi = await dbGet('poi', poiId);
  const photos = await dbGetByIndex('photos', 'poiId', poiId);
  const cat = CATEGORIES[poi.content.category] || CATEGORIES.other;

  const body = document.getElementById('panel-body');
  const footer = document.getElementById('panel-footer');

  const tagsHtml = (poi.content.tags || []).map(t => `<span class="detail-tag">${escHtml(t)}</span>`).join('');
  const photosHtml = photos.map(p => {
    const url = URL.createObjectURL(p.blob);
    return `<div class="detail-photo"><img src="${url}" onclick="openLightbox('${url}')" loading="lazy"></div>`;
  }).join('');

  body.innerHTML = `
    <div>
      <span class="detail-category-badge" style="background:${cat.color}">${cat.icon} ${cat.label}</span>
      <h2 style="font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:700;line-height:1.3;margin-bottom:8px">${escHtml(poi.content.title || 'Sans titre')}</h2>
      ${poi.content.description ? `<p class="detail-description">${escHtml(poi.content.description)}</p>` : ''}
    </div>
    ${tagsHtml ? `<div class="detail-tags">${tagsHtml}</div>` : ''}
    ${photosHtml ? `<div class="detail-photo-grid">${photosHtml}</div>` : ''}
    <div class="detail-coords">📍 ${poi.location.lat.toFixed(5)}, ${poi.location.lng.toFixed(5)}</div>
    <div style="font-size:.72rem;color:var(--text-muted)">Ajouté le ${new Date(poi.createdAt).toLocaleDateString('fr-FR', {day:'numeric',month:'long',year:'numeric'})}</div>
  `;

  footer.innerHTML = `
    <button class="btn-danger" onclick="deletePoi('${poi.id}')">Supprimer</button>
    <div style="flex:1"></div>
    <button class="btn-secondary" onclick="closePanel()">Fermer</button>
    <button class="btn-primary" onclick="openEditForm('${poi.id}')">Modifier</button>
  `;

  openPanel(poi.content.title || 'Détail');
}

async function deletePoi(poiId) {
  if (!confirm('Supprimer ce lieu définitivement ?')) return;
  // Delete photos
  const photos = await dbGetByIndex('photos', 'poiId', poiId);
  for (const p of photos) await dbDelete('photos', p.photoId);
  await dbDelete('poi', poiId);
  removeMarkerFromMap(poiId);
  allPois = await dbGetAll('poi');
  updatePoiCount();
  closePanel();
  showToast('🗑️ Lieu supprimé');
}

// ═══════════════════════════════════════════════
// LIGHTBOX
// ═══════════════════════════════════════════════
function openLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// ═══════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════
async function exportData() {
  showToast('⏳ Export en cours…');
  const pois = await dbGetAll('poi');
  const full = await Promise.all(pois.map(async poi => {
    const photos = await dbGetByIndex('photos', 'poiId', poi.id);
    const photosData = await Promise.all(photos.map(async p => {
      const data = await blobToBase64(p.blob);
      return { photoId: p.photoId, mimeType: p.mimeType, sizeBytes: p.sizeBytes, data };
    }));
    return { ...poi, photosData };
  }));

  const json = JSON.stringify({ version: 1, exportDate: new Date().toISOString(), pois: full }, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `paris-map-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ Export terminé !');
}

function blobToBase64(blob) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => res(reader.result.split(',')[1]);
    reader.onerror = rej;
    reader.readAsDataURL(blob);
  });
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, duration = 2800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function updatePoiCount() {
  document.getElementById('poi-count').textContent =
    `${allPois.length} lieu${allPois.length !== 1 ? 'x' : ''}`;
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
(async function init() {
  await initDB();
  initMap();
  renderFilterBar();

  allPois = await dbGetAll('poi');
  for (const poi of allPois) addMarkerToMap(poi);
  updatePoiCount();

  // Hint auto-hide after 6s
  setTimeout(() => document.getElementById('map-hint').classList.add('hidden'), 6000);

  console.log(`✅ Paris Map initialisé — ${allPois.length} POI chargés depuis IndexedDB`);
})();
</script>
